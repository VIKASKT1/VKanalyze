  <polygon points="330,90 315,95 325,110 350,75"
           fill="#34D399"/>

  <!-- Text -->
  <text x="250"
        y="360"
        font-family="Arial, Helvetica, sans-serif"
        font-size="48"
        font-weight="bold"
        text-anchor="middle"
        fill="#E5E7EB">
    VKAnalyze
  </text>
</svg>