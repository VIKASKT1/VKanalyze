<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 500">
  <rect width="500" height="500" fill="#000000"/>

  <!-- Bars -->
  <rect x="140" y="180" width="40" height="110" rx="10" fill="#34D399"/>
  <rect x="200" y="130" width="40" height="160" rx="10" fill="#34D399"/>
  <rect x="260" y="100" width="40" height="190" rx="10" fill="#34D399"/>

  <!-- Growth Arrow -->
  <path d="M125 240 L330 90"
        stroke="#34D399"
        stroke-width="12"
        fill="none"
